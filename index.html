<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Võ Sinh Làng Tre</title>
  </head>
  <body>
    <main id="shell">
      <section id="game-root" aria-label="Võ Sinh Làng Tre"></section>

      <div id="hud" aria-live="polite">
        <div class="hud-card hud-card--title">
          <span class="crest"></span>
          <div>
            <p class="eyebrow">Võ Sinh Làng Tre</p>
            <h1 id="quest-title">Tìm thầy ở đình làng</h1>
            <span id="map-name" class="map-chip">Làng Tre</span>
            <span id="terrain-name" class="map-chip map-chip--terrain">Đất khô</span>
          </div>
        </div>

        <div class="hud-card meters">
          <div class="level-head">
            <div>
              <span id="rank-name">Võ sinh nhập môn</span>
              <strong id="level-count">Cấp 1</strong>
            </div>
            <span id="attack-count">Gậy +1</span>
          </div>
          <div class="meter meter--xp">
            <span id="xp-bar"></span>
          </div>
          <div class="meter-row meter-row--xp">
            <span>Kinh nghiệm</span>
            <strong id="xp-count">0/70</strong>
          </div>
          <!-- Hai chỉ tiêu động, đổi theo map đang đứng -->
          <div class="meter-row">
            <span id="obj-collect-label">Sen</span>
            <strong id="obj-collect-count">0/5</strong>
          </div>
          <div class="meter">
            <span id="obj-collect-bar"></span>
          </div>
          <div class="meter-row">
            <span id="obj-train-label">Bù nhìn</span>
            <strong id="obj-train-count">0/4</strong>
          </div>
          <div class="meter meter--warm">
            <span id="obj-train-bar"></span>
          </div>
          <div class="save-row">
            <span id="save-status">Tự lưu</span>
            <button id="reset-save" type="button">Chơi lại</button>
          </div>
        </div>

        <div id="prompt" class="prompt">WASD/Phím mũi tên để đi, Space/E để nói chuyện hoặc tương tác.</div>
      </div>

      <div id="notice-stack" aria-live="polite"></div>

      <div id="skill-dock" aria-label="Kỹ năng">
        <div class="skill-slot" id="staff-skill">
          <span class="skill-icon">✦</span>
          <div>
            <strong>Gậy tre</strong>
            <small id="skill-state">Sẵn sàng</small>
          </div>
        </div>
      </div>

      <div id="dialogue" class="dialogue" hidden>
        <div class="dialogue-speaker" id="dialogue-speaker">Thầy Ba</div>
        <p id="dialogue-text"></p>
        <div class="dialogue-hint" id="dialogue-hint">Space/E để tiếp tục</div>
      </div>

      <div id="touch-controls" aria-label="Điều khiển cảm ứng">
        <div class="touch-pad">
          <button data-action="up" aria-label="Lên">▲</button>
          <div>
            <button data-action="left" aria-label="Trái">◀</button>
            <button data-action="down" aria-label="Xuống">▼</button>
            <button data-action="right" aria-label="Phải">▶</button>
          </div>
        </div>
        <div class="touch-actions">
          <button data-action="interact" aria-label="Tương tác">⎋</button>
          <button data-action="strike" aria-label="Ra đòn">✦</button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
